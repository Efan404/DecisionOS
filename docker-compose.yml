services:
  api:
    build:
      context: .
      dockerfile: backend/Dockerfile
    environment:
      LLM_MODE: ${LLM_MODE:-mock}
      DECISIONOS_DB_PATH: ${DECISIONOS_DB_PATH:-/data/decisionos.db}
      DECISIONOS_SECRET_KEY: ${DECISIONOS_SECRET_KEY:-decisionos-dev-secret-change-me}
      DECISIONOS_CORS_ORIGINS: ${DECISIONOS_CORS_ORIGINS:-http://localhost:3000,http://web:3000}
    volumes:
      - decisionos_data:/data
    expose:
      - "8000"
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        API_INTERNAL_URL: ${API_INTERNAL_URL:-http://api:8000}
    environment:
      API_INTERNAL_URL: ${API_INTERNAL_URL:-http://api:8000}
    depends_on:
      - api
    ports:
      - "${WEB_PORT:-19888}:3000"
    restart: unless-stopped

volumes:
  decisionos_data:
